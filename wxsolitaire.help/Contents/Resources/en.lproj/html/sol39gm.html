<h1>Changing the Card Design</h1>

<ol>
<li>From the Game menu, choose Deck.</li>
<li>Double-click the card design you want.
<p>Or use the arrow keys to select a design, and then press ENTER.</p></li>
</ol>

<p>You can change designs at any time.</p>
